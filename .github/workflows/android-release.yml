name: Android Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag (example: android-v4.1.0-shognate.1)"
        required: true
        type: string
      release_name:
        description: "Release title"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "android-v*"

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Build release APK
        working-directory: android
        run: ./gradlew --no-daemon assembleRelease

      - name: Prepare release asset
        id: asset
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          ASSET="multi-agent-shognate-android-${TAG}.apk"
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/${ASSET}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: dist/${{ steps.asset.outputs.asset }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.asset.outputs.tag }}
          name: ${{ github.event.inputs.release_name || format('multi-agent-shognate Android {0}', steps.asset.outputs.tag) }}
          files: dist/${{ steps.asset.outputs.asset }}
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.prerelease == true }}
          target_commitish: ${{ github.sha }}
