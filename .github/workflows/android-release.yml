name: Android Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag (format: android-v<upstream-version>.<fork-revision>, e.g. android-v4.4.1.0)"
        required: true
        type: string
      release_name:
        description: "Release title"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "android-v*"

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run prepublish check
        run: |
          bash scripts/prepublish_check.sh

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          printf 'sdk.dir=%s\n' "${ANDROID_SDK_ROOT}" > local.properties
          ./gradlew --no-daemon assembleRelease

      - name: Validate release tag format
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          if ! printf '%s\n' "$TAG" | grep -Eq '^android-v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid release tag format: $TAG"
            echo "Expected format: android-v<upstream-version>.<fork-revision> (example: android-v4.4.1.0)"
            exit 1
          fi

      - name: Prepare release asset
        id: asset
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#android-}"
          export VERSION
          APK_ASSET="multi-agent-shognate-android-${VERSION}.apk"
          INSTALLER_ASSET="multi-agent-shognate-installer-${VERSION}.bat"
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/${APK_ASSET}"
          python3 - <<'PY'
          from pathlib import Path
          import os

          tag = os.environ["TAG"]
          version = os.environ["VERSION"]
          src = Path("install.bat").read_text(encoding="utf-8")
          src = src.replace('set "REPO_REF=main"', f'set "REPO_REF={tag}"')
          src = src.replace('set "REPO_REF_KIND=heads"', 'set "REPO_REF_KIND=tags"')
          src = src.replace('set "REPO_VERSION_LABEL=main"', f'set "REPO_VERSION_LABEL={tag}"')
          Path("dist").mkdir(parents=True, exist_ok=True)
          Path("dist").joinpath(f"multi-agent-shognate-installer-{version}.bat").write_text(
              src,
              encoding="utf-8",
              newline="\r\n",
          )
          PY
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "apk_asset=${APK_ASSET}" >> "$GITHUB_OUTPUT"
          echo "installer_asset=${INSTALLER_ASSET}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ github.event.inputs.release_tag || github.ref_name }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-assets
          path: |
            dist/${{ steps.asset.outputs.apk_asset }}
            dist/${{ steps.asset.outputs.installer_asset }}

      - name: Delete existing release assets for tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `${{ steps.asset.outputs.tag }}`;
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              for (const asset of release.assets) {
                core.info(`Deleting existing asset: ${asset.name}`);
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release for ${tag}`);
              } else {
                throw error;
              }
            }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.asset.outputs.tag }}
          name: ${{ github.event.inputs.release_name || format('multi-agent-shognate Android {0}', steps.asset.outputs.tag) }}
          files: |
            dist/${{ steps.asset.outputs.apk_asset }}
            dist/${{ steps.asset.outputs.installer_asset }}
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.prerelease == true }}
          target_commitish: ${{ github.sha }}
